<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MR AI Stan</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
    }
    h2 {
      margin-top: 0;
      color: #38bdf8;
      font-size: 1.1rem;
    }
    textarea {
      width: 100%;
      height: 80px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #fff;
      border-radius: 8px;
      padding: 8px;
      box-sizing: border-box;
      resize: none;
    }
    button {
      margin-top: 8px;
      width: 100%;
      padding: 10px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #0369a1; }
    #response {
      margin-top: 12px;
      padding: 8px;
      background: #1e293b;
      border-radius: 6px;
      font-size: 0.85rem;
      min-height: 40px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h2>⚡ MR AI Stan Pro</h2>
  <textarea id="userInput" placeholder="Andika maelekezo au swali..."></textarea>
  <button id="sendBtn">Tuma Kazi</button>
  <div id="response">Tayari...</div>

  <script>
    document.getElementById('sendBtn').addEventListener('click', async () => {
      const prompt = document.getElementById('userInput').value;
      const responseDiv = document.getElementById('response');
      
      if (!prompt.trim()) return;
      responseDiv.textContent = "Inaprosesi...";

      try {
        const res = await fetch('http://127.0.0.1:8000/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        responseDiv.textContent = data.reply || "Hakuna majibu.";
      } catch (err) {
        responseDiv.textContent = "Error: Backend haipatikani kwenye http://127.0.0.1:8000";
      }
    });
  </script>
</body>
</html>
